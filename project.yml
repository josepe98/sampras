name: Sampras
options:
  bundleIdPrefix: com.erikjosephson
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Sampras:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sampras
    settings:
      base:
        PRODUCT_NAME: Sampras
        PRODUCT_BUNDLE_IDENTIFIER: com.erikjosephson.Sampras
        INFOPLIST_FILE: Sampras/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
    info:
      path: Sampras/Info.plist
      properties:
        CFBundleName: Sampras
        CFBundleDisplayName: Sampras
        CFBundleIdentifier: com.erikjosephson.Sampras
        CFBundleVersion: "5"
        CFBundleShortVersionString: "1.4"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: YES
        NSPrincipalClass: NSApplication
